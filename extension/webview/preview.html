<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Reading — Preview</title>
  <style>
    :root {
      --vscode-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --vscode-font-size: 13px;
      --vscode-foreground: #cccccc;
      --vscode-descriptionForeground: #8b8b8b;
      --vscode-panel-border: #3c3c3c;
      --vscode-editor-background: #1e1e1e;
      --vscode-focusBorder: #007acc;
      --vscode-badge-background: #4d4d4d;
      --vscode-badge-foreground: #cccccc;
      --vscode-textCodeBlock-background: #2d2d2d;
    }
    body {
      margin: 0;
      padding: 0;
      background: #252526;
      display: flex;
      height: 100vh;
    }
    .preview-sidebar {
      width: 340px;
      min-width: 280px;
      max-width: 420px;
      border-right: 1px solid var(--vscode-panel-border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .preview-controls {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #2d2d2d;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #444;
      z-index: 100;
      font-family: var(--vscode-font-family);
      font-size: 12px;
      color: var(--vscode-foreground);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      width: 360px;
    }
    .preview-controls label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.6;
    }
    .preview-controls select, .preview-controls button {
      margin: 4px 0;
      padding: 5px 8px;
      background: #1e1e1e;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      display: block;
      width: 100%;
      font-size: 12px;
    }
    .preview-controls select:focus, .preview-controls button:focus {
      outline: 1px solid var(--vscode-focusBorder);
    }
    .preview-controls button:hover {
      background: #333;
    }
    .file-search {
      margin: 4px 0;
      padding: 5px 8px;
      background: #1e1e1e;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 4px;
      display: block;
      width: 100%;
      font-size: 12px;
      box-sizing: border-box;
      font-family: inherit;
    }
    .file-search:focus {
      outline: 1px solid var(--vscode-focusBorder);
      border-color: var(--vscode-focusBorder);
    }
    .file-search::placeholder {
      color: #666;
    }
    .file-list-wrap {
      max-height: 240px;
      overflow-y: auto;
      margin: 4px 0;
      border: 1px solid #444;
      border-radius: 4px;
      background: #1e1e1e;
    }
    .file-list-wrap::-webkit-scrollbar {
      width: 6px;
    }
    .file-list-wrap::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 3px;
    }
    .file-item {
      padding: 4px 8px;
      cursor: pointer;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #bbb;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    .file-item:hover { background: #333; }
    .file-item.active { background: rgba(0,122,204,0.2); color: #fff; }
    .file-item-count {
      flex-shrink: 0;
      color: #666;
      font-size: 10px;
    }
    .preview-main {
      flex: 1;
      overflow: auto;
      background: var(--vscode-editor-background);
    }
    .code-container {
      display: flex;
      font-family: 'Cascadia Code', Consolas, 'Courier New', monospace;
      font-size: 13px;
      line-height: 20px;
      min-height: 100%;
    }
    .line-numbers {
      padding: 12px 8px 12px 16px;
      text-align: right;
      color: #555;
      user-select: none;
      flex-shrink: 0;
      border-right: 1px solid #333;
    }
    .line-numbers div {
      height: 20px;
    }
    .code-lines {
      padding: 12px 16px;
      flex: 1;
      color: #ccc;
      white-space: pre;
      overflow-x: auto;
    }
    .code-lines div {
      height: 20px;
    }
    .code-lines div.highlight {
      background: rgba(0, 122, 204, 0.15);
      margin: 0 -16px;
      padding: 0 16px;
    }
    .code-placeholder {
      padding: 48px 20px;
      text-align: center;
      color: #555;
      font-family: var(--vscode-font-family);
      font-size: 14px;
    }
    .preview-file-header {
      padding: 6px 16px;
      font-family: var(--vscode-font-family);
      font-size: 12px;
      color: #888;
      background: #2d2d2d;
      border-bottom: 1px solid #333;
    }
  </style>
</head>
<body>
  <div class="preview-sidebar">
    <div id="root"></div>
  </div>
  <div class="preview-main" id="code-preview">
    <div class="code-placeholder">Select a file to view source code.</div>
  </div>
  <div class="preview-controls">
    <label>File:</label>
    <input type="text" class="file-search" id="file-search" placeholder="Search files... (e.g. agent, provider)" autocomplete="off" />
    <div class="file-list-wrap" id="file-list"></div>
    <div style="display:flex; gap:6px; margin-top:4px;">
      <button id="reload-btn" style="flex:1;">Reload</button>
      <div id="status" style="flex:2; font-size:11px; color:#888; display:flex; align-items:center;">Ready</div>
    </div>
  </div>

  <script>
    const messageHandlers = [];
    let currentHighlight = { startLine: 0, endLine: 0 };

    window.acquireVsCodeApi = function() {
      return {
        postMessage: function(msg) {
          if (msg.type === 'navigateTo') {
            highlightLines(msg.startLine, msg.endLine || msg.startLine);
            document.getElementById('status').textContent =
              `L${msg.startLine}–${msg.endLine || msg.startLine}`;
          }
        },
        getState: function() { return null; },
        setState: function() {}
      };
    };

    const origAddEventListener = window.addEventListener;
    window.addEventListener = function(type, handler, ...rest) {
      if (type === 'message') {
        messageHandlers.push(handler);
      }
      return origAddEventListener.call(this, type, handler, ...rest);
    };
  </script>
  <script src="../out/webview.js"></script>
  <script>
    const ANALYSIS_DATA = PREVIEW_DATA;

    const searchInput = document.getElementById('file-search');
    const fileList = document.getElementById('file-list');
    const codePreview = document.getElementById('code-preview');
    const status = document.getElementById('status');

    const allFiles = Object.entries(ANALYSIS_DATA)
      .map(([key, data]) => ({ key, file: data.file, count: data.entities.length }))
      .sort((a, b) => b.count - a.count || a.file.localeCompare(b.file));

    let activeKey = null;

    function sendFileData(fileData) {
      const event = new MessageEvent('message', {
        data: {
          type: 'fileChanged',
          file: fileData.file,
          entities: fileData.entities,
          hasData: true
        }
      });
      window.dispatchEvent(event);
    }

    function renderSource(filePath, content) {
      const lines = content.split('\n');
      const header = document.createElement('div');
      header.className = 'preview-file-header';
      header.textContent = filePath;

      const container = document.createElement('div');
      container.className = 'code-container';

      const nums = document.createElement('div');
      nums.className = 'line-numbers';
      const code = document.createElement('div');
      code.className = 'code-lines';
      code.id = 'code-lines';

      for (let i = 0; i < lines.length; i++) {
        const numDiv = document.createElement('div');
        numDiv.textContent = String(i + 1);
        nums.appendChild(numDiv);

        const lineDiv = document.createElement('div');
        lineDiv.textContent = lines[i];
        lineDiv.dataset.line = String(i + 1);
        code.appendChild(lineDiv);
      }

      container.appendChild(nums);
      container.appendChild(code);

      codePreview.innerHTML = '';
      codePreview.appendChild(header);
      codePreview.appendChild(container);
    }

    function highlightLines(startLine, endLine) {
      const codeLines = document.getElementById('code-lines');
      if (!codeLines) return;

      for (const div of codeLines.children) {
        div.classList.remove('highlight');
      }

      for (let i = startLine; i <= endLine && i <= codeLines.children.length; i++) {
        const div = codeLines.children[i - 1];
        if (div) div.classList.add('highlight');
      }

      const target = codeLines.children[startLine - 1];
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    async function loadSourceFile(filePath) {
      try {
        const resp = await fetch(`/api/source?file=${encodeURIComponent(filePath)}`);
        if (!resp.ok) {
          codePreview.innerHTML = '<div class="code-placeholder">Source file not found.</div>';
          return;
        }
        const data = await resp.json();
        renderSource(data.file, data.content);
      } catch {
        codePreview.innerHTML = '<div class="code-placeholder">Failed to load source.</div>';
      }
    }

    function selectFile(key) {
      activeKey = key;
      const data = ANALYSIS_DATA[key];
      if (!data) return;
      sendFileData(data);
      loadSourceFile(data.file);
      status.textContent = `${data.entities.length} entities`;
      renderFileList(searchInput.value);
    }

    function renderFileList(query) {
      const q = query.toLowerCase().trim();
      const filtered = q
        ? allFiles.filter(f => f.file.toLowerCase().includes(q))
        : allFiles;

      const visible = filtered.slice(0, 80);
      const remaining = filtered.length - visible.length;

      fileList.innerHTML = '';
      for (const f of visible) {
        const div = document.createElement('div');
        div.className = 'file-item' + (f.key === activeKey ? ' active' : '');
        const pathSpan = document.createElement('span');
        pathSpan.textContent = f.file;
        pathSpan.style.overflow = 'hidden';
        pathSpan.style.textOverflow = 'ellipsis';
        const countSpan = document.createElement('span');
        countSpan.className = 'file-item-count';
        countSpan.textContent = f.count > 0 ? String(f.count) : '';
        div.appendChild(pathSpan);
        div.appendChild(countSpan);
        div.addEventListener('click', () => selectFile(f.key));
        fileList.appendChild(div);
      }
      if (remaining > 0) {
        const more = document.createElement('div');
        more.className = 'file-item';
        more.style.color = '#666';
        more.style.fontStyle = 'italic';
        more.textContent = `... ${remaining} more (type to filter)`;
        fileList.appendChild(more);
      }
    }

    searchInput.addEventListener('input', () => renderFileList(searchInput.value));
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        const q = searchInput.value.toLowerCase().trim();
        const filtered = q
          ? allFiles.filter(f => f.file.toLowerCase().includes(q))
          : allFiles;
        const visible = filtered.slice(0, 80);
        const idx = visible.findIndex(f => f.key === activeKey);
        const next = e.key === 'ArrowDown'
          ? Math.min(idx + 1, visible.length - 1)
          : Math.max(idx - 1, 0);
        if (visible[next]) selectFile(visible[next].key);
      } else if (e.key === 'Escape') {
        searchInput.blur();
      }
    });
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
      }
    });

    document.getElementById('reload-btn').addEventListener('click', () => location.reload());

    renderFileList('');
    if (allFiles.length > 0) {
      selectFile(allFiles[0].key);
    }
  </script>
</body>
</html>
