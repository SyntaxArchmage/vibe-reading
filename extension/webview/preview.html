<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Reading — Preview</title>
  <style>
    :root {
      --vscode-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --vscode-font-size: 13px;
      --vscode-foreground: #cccccc;
      --vscode-descriptionForeground: #8b8b8b;
      --vscode-panel-border: #3c3c3c;
      --vscode-editor-background: #1e1e1e;
      --vscode-focusBorder: #007acc;
      --vscode-badge-background: #4d4d4d;
      --vscode-badge-foreground: #cccccc;
      --vscode-textCodeBlock-background: #2d2d2d;
    }
    body {
      margin: 0;
      padding: 0;
      background: #252526;
      display: flex;
      height: 100vh;
    }
    .preview-sidebar {
      width: 340px;
      min-width: 280px;
      max-width: 420px;
      border-right: 1px solid var(--vscode-panel-border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .preview-controls {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #2d2d2d;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #444;
      z-index: 100;
      font-family: var(--vscode-font-family);
      font-size: 12px;
      color: var(--vscode-foreground);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .preview-controls label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.6;
    }
    .preview-controls select, .preview-controls button {
      margin: 4px 0;
      padding: 5px 8px;
      background: #1e1e1e;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      display: block;
      width: 100%;
      font-size: 12px;
    }
    .preview-controls select:focus, .preview-controls button:focus {
      outline: 1px solid var(--vscode-focusBorder);
    }
    .preview-controls button:hover {
      background: #333;
    }
    .preview-main {
      flex: 1;
      overflow: auto;
      background: var(--vscode-editor-background);
    }
    .code-container {
      display: flex;
      font-family: 'Cascadia Code', Consolas, 'Courier New', monospace;
      font-size: 13px;
      line-height: 20px;
      min-height: 100%;
    }
    .line-numbers {
      padding: 12px 8px 12px 16px;
      text-align: right;
      color: #555;
      user-select: none;
      flex-shrink: 0;
      border-right: 1px solid #333;
    }
    .line-numbers div {
      height: 20px;
    }
    .code-lines {
      padding: 12px 16px;
      flex: 1;
      color: #ccc;
      white-space: pre;
      overflow-x: auto;
    }
    .code-lines div {
      height: 20px;
    }
    .code-lines div.highlight {
      background: rgba(0, 122, 204, 0.15);
      margin: 0 -16px;
      padding: 0 16px;
    }
    .code-placeholder {
      padding: 48px 20px;
      text-align: center;
      color: #555;
      font-family: var(--vscode-font-family);
      font-size: 14px;
    }
    .preview-file-header {
      padding: 6px 16px;
      font-family: var(--vscode-font-family);
      font-size: 12px;
      color: #888;
      background: #2d2d2d;
      border-bottom: 1px solid #333;
    }
  </style>
</head>
<body>
  <div class="preview-sidebar">
    <div id="root"></div>
  </div>
  <div class="preview-main" id="code-preview">
    <div class="code-placeholder">Select a file to view source code.</div>
  </div>
  <div class="preview-controls">
    <label>File:</label>
    <select id="file-select"></select>
    <button id="reload-btn">Reload Data</button>
    <div id="status" style="margin-top:8px; color:#888;">Ready</div>
  </div>

  <script>
    const messageHandlers = [];
    let currentHighlight = { startLine: 0, endLine: 0 };

    window.acquireVsCodeApi = function() {
      return {
        postMessage: function(msg) {
          if (msg.type === 'navigateTo') {
            highlightLines(msg.startLine, msg.endLine || msg.startLine);
            document.getElementById('status').textContent =
              `L${msg.startLine}–${msg.endLine || msg.startLine}`;
          }
        },
        getState: function() { return null; },
        setState: function() {}
      };
    };

    const origAddEventListener = window.addEventListener;
    window.addEventListener = function(type, handler, ...rest) {
      if (type === 'message') {
        messageHandlers.push(handler);
      }
      return origAddEventListener.call(this, type, handler, ...rest);
    };
  </script>
  <script src="../out/webview.js"></script>
  <script>
    const ANALYSIS_DATA = PREVIEW_DATA;

    const select = document.getElementById('file-select');
    const codePreview = document.getElementById('code-preview');
    const status = document.getElementById('status');

    function sendFileData(fileData) {
      const event = new MessageEvent('message', {
        data: {
          type: 'fileChanged',
          file: fileData.file,
          entities: fileData.entities,
          hasData: true
        }
      });
      window.dispatchEvent(event);
    }

    function renderSource(filePath, content) {
      const lines = content.split('\n');
      const header = document.createElement('div');
      header.className = 'preview-file-header';
      header.textContent = filePath;

      const container = document.createElement('div');
      container.className = 'code-container';

      const nums = document.createElement('div');
      nums.className = 'line-numbers';
      const code = document.createElement('div');
      code.className = 'code-lines';
      code.id = 'code-lines';

      for (let i = 0; i < lines.length; i++) {
        const numDiv = document.createElement('div');
        numDiv.textContent = String(i + 1);
        nums.appendChild(numDiv);

        const lineDiv = document.createElement('div');
        lineDiv.textContent = lines[i];
        lineDiv.dataset.line = String(i + 1);
        code.appendChild(lineDiv);
      }

      container.appendChild(nums);
      container.appendChild(code);

      codePreview.innerHTML = '';
      codePreview.appendChild(header);
      codePreview.appendChild(container);
    }

    function highlightLines(startLine, endLine) {
      const codeLines = document.getElementById('code-lines');
      if (!codeLines) return;

      for (const div of codeLines.children) {
        div.classList.remove('highlight');
      }

      for (let i = startLine; i <= endLine && i <= codeLines.children.length; i++) {
        const div = codeLines.children[i - 1];
        if (div) div.classList.add('highlight');
      }

      const target = codeLines.children[startLine - 1];
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    async function loadSourceFile(filePath) {
      try {
        const resp = await fetch(`/api/source?file=${encodeURIComponent(filePath)}`);
        if (!resp.ok) {
          codePreview.innerHTML = '<div class="code-placeholder">Source file not found.</div>';
          return;
        }
        const data = await resp.json();
        renderSource(data.file, data.content);
      } catch {
        codePreview.innerHTML = '<div class="code-placeholder">Failed to load source.</div>';
      }
    }

    function loadPreviewData() {
      select.innerHTML = '';
      for (const [name, data] of Object.entries(ANALYSIS_DATA)) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = `${data.file} (${data.entities.length})`;
        select.appendChild(opt);
      }

      select.addEventListener('change', () => {
        const data = ANALYSIS_DATA[select.value];
        if (data) {
          sendFileData(data);
          loadSourceFile(data.file);
          status.textContent = `${data.file} · ${data.entities.length} entities`;
        }
      });

      document.getElementById('reload-btn').addEventListener('click', () => {
        location.reload();
      });

      if (select.options.length > 0) {
        const first = ANALYSIS_DATA[select.options[0].value];
        if (first) {
          sendFileData(first);
          loadSourceFile(first.file);
          status.textContent = `${first.file} · ${first.entities.length} entities`;
        }
      }
    }

    loadPreviewData();
  </script>
</body>
</html>
