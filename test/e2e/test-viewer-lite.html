  .vr-layout {
    display: flex;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    background: #1e1e1e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    color: #ccc;
  }

  .vr-resize-handle {
    width: 4px;
    cursor: col-resize;
    background: transparent;
    flex-shrink: 0;
    position: relative;
    z-index: 5;
    transition: background 0.15s;
  }

  .vr-resize-handle:hover,
  .vr-resize-handle:active {
    background: #007acc;
  }

  .vr-sidebar {
    flex-shrink: 0;
    border-right: 1px solid #3c3c3c;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #252526;
  }

  .vr-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .vr-breadcrumb-bar {
    display: flex;
    align-items: center;
    background: #252526;
    border-bottom: 1px solid #3c3c3c;
    height: 28px;
    padding: 0 12px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .vr-breadcrumb-segment {
    display: flex;
    align-items: center;
    white-space: nowrap;
  }

  .vr-breadcrumb-sep {
    color: #555;
    font-size: 9px;
    margin: 0 6px;
  }

  .vr-breadcrumb-label {
    font-size: 12px;
    color: #888;
    cursor: default;
  }

  .vr-breadcrumb-label--active {
    color: #ccc;
    font-weight: 500;
  }

  .vr-editor-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .vr-editor-placeholder {
    padding: 48px 20px;
    text-align: center;
    color: #555;
    font-size: 14px;
  }

  .vr-monaco-highlight {
    background: rgba(0, 122, 204, 0.15) !important;
  }

  .vr-monaco-glyph {
    background: #007acc;
    width: 3px !important;
    margin-left: 3px;
    border-radius: 1px;
  }

  .vr-monaco-hover-range {
    background: rgba(0, 122, 204, 0.06) !important;
    border-left: 2px solid rgba(0, 122, 204, 0.3);
  }

  /* File picker */
  .vr-picker {
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: 380px;
    max-height: 400px;
    background: #2d2d2d;
    border: 1px solid #555;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 200;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .vr-picker-header {
    display: flex;
    padding: 8px;
    gap: 6px;
    border-bottom: 1px solid #444;
  }

  .vr-picker-search {
    flex: 1;
    padding: 6px 10px;
    background: #1e1e1e;
    color: #ccc;
    border: 1px solid #555;
    border-radius: 4px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
  }

  .vr-picker-search:focus {
    border-color: #007acc;
  }

  .vr-picker-close {
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    font-size: 14px;
    padding: 4px 8px;
  }

  .vr-picker-close:hover {
    color: #ccc;
  }

  .vr-picker-list {
    flex: 1;
    overflow-y: auto;
    max-height: 280px;
  }

  .vr-picker-list::-webkit-scrollbar {
    width: 6px;
  }

  .vr-picker-list::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 3px;
  }

  .vr-picker-item {
    padding: 5px 12px;
    cursor: pointer;
    font-size: 11px;
    color: #bbb;
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }

  .vr-picker-item:hover {
    background: #333;
  }

  .vr-picker-item--active {
    background: rgba(0,122,204,0.2);
    color: #fff;
  }

  .vr-picker-path {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .vr-picker-count {
    flex-shrink: 0;
    color: #666;
    font-size: 10px;
  }

  .vr-picker-more {
    color: #666;
    font-style: italic;
    cursor: default;
  }

  .vr-picker-footer {
    padding: 4px 12px;
    font-size: 10px;
    color: #666;
    border-top: 1px solid #444;
    text-align: right;
  }
